openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Nepal Summer League Finland 2026 Tournament API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: teams
    description: Team management
  - name: matches
    description: Match/fixture management
  - name: standings
    description: League standings
  - name: goals
    description: Goal events
  - name: cards
    description: Card events
  - name: events
    description: Match timeline events
  - name: stats
    description: Tournament statistics
  - name: auth
    description: Admin authentication
  - name: tournament
    description: Tournament info management
  - name: announcements
    description: Announcements management
  - name: club-applications
    description: KSB club membership applications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ─────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getAdminMe
      tags: [auth]
      summary: Get current admin session
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated

  # ── Teams ─────────────────────────────────────────────────────────────
  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all teams
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          description: Not found
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdate"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  # ── Players ───────────────────────────────────────────────────────────
  /teams/{teamId}/players:
    get:
      operationId: listPlayers
      tags: [teams]
      summary: List players for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Players list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: addPlayer
      tags: [teams]
      summary: Add a player to a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /teams/{teamId}/players/{playerId}:
    patch:
      operationId: updatePlayer
      tags: [teams]
      summary: Update a player (admin only)
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
    delete:
      operationId: deletePlayer
      tags: [teams]
      summary: Remove a player from a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Matches ───────────────────────────────────────────────────────────
  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List all matches
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, live, finished]
      responses:
        "200":
          description: Matches list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
    post:
      operationId: createMatch
      tags: [matches]
      summary: Create a match fixture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/generate:
    post:
      operationId: generateFixtures
      tags: [matches]
      summary: Auto-generate round-robin fixtures for all teams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "201":
          description: Fixtures generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
        "400":
          description: Not enough teams registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "403":
          description: Incorrect password
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /matches/create-final:
    post:
      operationId: createFinalMatch
      tags: [matches]
      summary: Create final match from top-2 teams after all league matches are finished
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "201":
          description: Final match created
          content:
            application/json:
              schema:
                type: object
                properties:
                  match:
                    $ref: "#/components/schemas/Match"
                  finalists:
                    type: array
                    items:
                      type: object
                      properties:
                        position:
                          type: integer
                        teamName:
                          type: string
                        teamShortName:
                          type: string
                        points:
                          type: integer
                        goalDifference:
                          type: integer
        "400":
          description: Not all league matches finished or other validation error
        "409":
          description: Final match already exists

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get match by ID with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match with events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
        "404":
          description: Not found
    patch:
      operationId: updateMatch
      tags: [matches]
      summary: Update match (score, status, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchUpdate"
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{id}/start:
    post:
      operationId: startMatch
      tags: [matches]
      summary: Start a match
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{id}/finish:
    post:
      operationId: finishMatch
      tags: [matches]
      summary: Finish a match
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{id}/reset:
    post:
      operationId: resetMatch
      tags: [matches]
      summary: Reset a match back to upcoming
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  # ── Goals ─────────────────────────────────────────────────────────────
  /matches/{matchId}/goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List goals for a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Goals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: addGoal
      tags: [goals]
      summary: Add a goal to a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Goal added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /matches/{matchId}/goals/{goalId}:
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
        - name: goalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Cards ─────────────────────────────────────────────────────────────
  /matches/{matchId}/cards:
    get:
      operationId: listCards
      tags: [cards]
      summary: List cards for a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Card"
    post:
      operationId: addCard
      tags: [cards]
      summary: Add a card to a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardInput"
      responses:
        "201":
          description: Card added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"

  /matches/{matchId}/cards/{cardId}:
    delete:
      operationId: deleteCard
      tags: [cards]
      summary: Delete a card
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
        - name: cardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Events ────────────────────────────────────────────────────────────
  /matches/{matchId}/events:
    get:
      operationId: listMatchEvents
      tags: [events]
      summary: List timeline events for a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchEvent"
    post:
      operationId: addMatchEvent
      tags: [events]
      summary: Add a timeline event to a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchEventInput"
      responses:
        "201":
          description: Event added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchEvent"

  # ── Standings ─────────────────────────────────────────────────────────
  /standings:
    get:
      operationId: getStandings
      tags: [standings]
      summary: Get current league standings
      responses:
        "200":
          description: Standings table
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StandingRow"

  # ── Statistics ────────────────────────────────────────────────────────
  /stats:
    get:
      operationId: getTournamentStats
      tags: [stats]
      summary: Get tournament statistics (top scorers, team stats, etc.)
      responses:
        "200":
          description: Tournament statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentStats"

  /stats/top-scorers:
    get:
      operationId: getTopScorers
      tags: [stats]
      summary: Get top goal scorers
      responses:
        "200":
          description: Top scorers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopScorer"

  # ── Club Settings ─────────────────────────────────────────────────────
  /api/club-settings:
    get:
      operationId: getClubSettings
      tags: [club-settings]
      summary: Get club settings (story paragraphs)
      responses:
        "200":
          description: Club settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubSettings"

  /api/admin/club-settings:
    put:
      operationId: updateClubSettings
      tags: [club-settings]
      summary: Update club settings (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubSettingsUpdate"
      responses:
        "200":
          description: Updated club settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubSettings"

  # ── Tournament Info CRUD ──────────────────────────────────────────────
  /tournaments:
    get:
      operationId: listTournaments
      tags: [tournament]
      summary: List all tournaments
      responses:
        "200":
          description: Tournament list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TournamentInfo"
    post:
      operationId: createTournamentInfo
      tags: [tournament]
      summary: Create a tournament (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentInfoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentInfo"

  /tournaments/active:
    get:
      operationId: getActiveTournament
      tags: [tournament]
      summary: Get the currently active tournament
      responses:
        "200":
          description: Active tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentInfo"
        "404":
          description: No tournament found

  /tournaments/{id}:
    patch:
      operationId: updateTournamentInfo
      tags: [tournament]
      summary: Update a tournament (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentInfoUpdate"
      responses:
        "200":
          description: Updated tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentInfo"
        "404":
          description: Not found
    delete:
      operationId: deleteTournamentInfo
      tags: [tournament]
      summary: Delete a tournament (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Announcements (public) ────────────────────────────────────────────
  /announcements:
    get:
      operationId: listPublishedAnnouncements
      tags: [announcements]
      summary: List published announcements (public)
      responses:
        "200":
          description: Published announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  # ── Announcements (admin) ──────────────────────────────────────────────
  /admin/announcements:
    get:
      operationId: listAllAnnouncements
      tags: [announcements]
      summary: List all announcements with optional filters (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published]
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create a new announcement (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /admin/announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "404":
          description: Not found
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /admin/announcements/{id}/publish:
    patch:
      operationId: toggleAnnouncementPublish
      tags: [announcements]
      summary: Publish or unpublish an announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishToggleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "404":
          description: Not found

  # ── Club applications ─────────────────────────────────────────────────
  /club-applications:
    post:
      operationId: submitClubApplication
      tags: [club-applications]
      summary: Submit a KSB club membership application (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "400":
          description: Missing required fields

  /admin/club-applications:
    get:
      operationId: listClubApplications
      tags: [club-applications]
      summary: List all club applications (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected]
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubApplication"

  /admin/club-applications/{id}:
    patch:
      operationId: updateClubApplication
      tags: [club-applications]
      summary: Accept or reject a club application (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubApplicationUpdate"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubApplication"
        "404":
          description: Not found
    delete:
      operationId: deleteClubApplication
      tags: [club-applications]
      summary: Delete a club application (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Tournament control ────────────────────────────────────────────────
  /tournament/reset:
    post:
      operationId: resetTournament
      tags: [matches]
      summary: Reset the entire tournament (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Tournament reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Incorrect password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── Auth ──────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [isAdmin, username]
      properties:
        isAdmin:
          type: boolean
        username:
          type: string

    # ── Team ─────────────────────────────────────────────────────────
    Team:
      type: object
      required: [id, name, shortName, primaryColor]
      properties:
        id:
          type: integer
        name:
          type: string
        shortName:
          type: string
        primaryColor:
          type: string
        logoUrl:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        managerName:
          type: ["string", "null"]
        managerPhone:
          type: ["string", "null"]
        managerEmail:
          type: ["string", "null"]
        squadStatus:
          type: ["string", "null"]
          description: "null = not submitted, pending = awaiting admin approval, approved = publicly visible"
